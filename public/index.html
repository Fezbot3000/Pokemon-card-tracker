    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "My Card Tracker",
        "description": "Track your card collection, manage investments, and monitor market values with My Card Tracker. Professional card collection management tool with real-time market values.",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0"
        }
      }
    </script>

    <!-- Start Single Page Apps for GitHub Pages -->
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <!-- End Single Page Apps for GitHub Pages -->

    <style>
      #loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #111827;
        z-index: 9999;
        opacity: 1;
        visibility: visible;
        transition: opacity 0.3s ease-out, visibility 0.3s ease-out;
      }
      
      .loader-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid #ffffff33;
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s linear infinite;
      }
      
      @keyframes spin {
        100% { transform: rotate(360deg); }
      }

      .loader-hidden {
        opacity: 0;
        visibility: hidden;
      }

      .loader-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
      }

      .loader-text {
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        font-size: 0.875rem;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="loader">
      <div class="loader-content">
        <div class="loader-spinner"></div>
        <div class="loader-text">Loading your content...</div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      // Hide loader when app is ready
      window.addEventListener('load', function() {
        const loader = document.getElementById('loader');
        if (loader) {
          setTimeout(() => {
            loader.classList.add('loader-hidden');
            setTimeout(() => {
              loader.style.display = 'none';
            }, 300);
          }, 500);
        }
      });
    </script>
  </body>
</html>
